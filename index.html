<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDZ</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Segoe UI',system-ui,sans-serif;
  background:#0d1117; color:#e6edf3;
  overflow:hidden; height:100vh;
}

.deck { width:100vw; height:100vh; position:relative; }

.slide {
  display:none; width:100%; height:100%;
  position:absolute; top:0; left:0;
  animation:fadeIn 0.3s ease;
}
.slide.active { display:flex; }
@keyframes fadeIn {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── TITLE ── */
.slide-title {
  background:radial-gradient(ellipse at 30% 50%,#1a2a4a 0%,#0d1117 70%);
  flex-direction:column; justify-content:center; padding:60px 80px;
}
.slide-title .tag {
  font-size:14px; letter-spacing:3px; text-transform:uppercase;
  color:#58a6ff; margin-bottom:24px;
}
.slide-title h1 { font-size:54px; font-weight:700; line-height:1.1; max-width:800px; }
.slide-title h1 span { color:#58a6ff; }
.slide-title .subtitle {
  margin-top:24px; font-size:19px; color:#8b949e;
  max-width:600px; line-height:1.6;
}
.slide-title .logo {
  position:absolute; bottom:56px; right:80px;
  font-size:13px; color:#30363d; letter-spacing:1px;
}

/* ── CONTENT ── */
.slide-content {
  background:#0d1117; flex-direction:column;
  justify-content:center; padding:48px 72px;
}
.slide-content h2 {
  font-size:30px; font-weight:600; margin-bottom:28px;
  border-left:4px solid #58a6ff; padding-left:18px; flex-shrink:0;
}

/* ── SPLIT ── */
.slide-split { background:#0d1117; flex-direction:row; }
.split-media {
  flex:0 0 62%; background:#090d13;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  overflow:hidden; padding:16px;
}
.split-media img {
  max-width:100%; max-height:100%; object-fit:contain; display:block;
}
.split-text {
  flex:1; display:flex; flex-direction:column;
  justify-content:center; padding:48px 40px;
  border-left:1px solid #21262d;
}
.split-text h2 {
  font-size:24px; font-weight:600; margin-bottom:22px;
  border-left:4px solid #58a6ff; padding-left:16px;
}
.split-text ul { list-style:none; display:flex; flex-direction:column; gap:13px; }
.split-text ul li {
  font-size:16px; line-height:1.55; color:#c9d1d9;
  padding-left:20px; position:relative;
}
.split-text ul li::before {
  content:'▸'; position:absolute; left:0; color:#58a6ff; font-size:13px; top:3px;
}
.split-text .badge {
  display:inline-block; margin-top:22px;
  background:#1f3a2a; color:#3fb950; border:1px solid #238636;
  border-radius:20px; padding:5px 16px; font-size:15px;
}

/* ── VIDEO PLAYER ── */
.video-wrap {
  width:100%; display:flex; flex-direction:column;
  border-radius:8px; overflow:hidden;
  border:1px solid #21262d;
}
.video-wrap video {
  width:100%; height:auto; display:block;
  cursor:pointer; background:#000;
}
.video-controls {
  background:#161b22; border-top:1px solid #21262d;
  padding:10px 14px; display:flex; flex-direction:column; gap:8px;
}
.vc-seek {
  width:100%; height:4px; background:#30363d;
  border-radius:99px; cursor:pointer; position:relative;
  appearance:none; -webkit-appearance:none; outline:none; border:none;
}
.vc-seek::-webkit-slider-thumb {
  -webkit-appearance:none; width:12px; height:12px;
  border-radius:50%; background:#58a6ff; cursor:pointer;
}
.vc-seek::-webkit-slider-runnable-track {
  background:transparent;
}
.vc-seek-track {
  width:100%; height:4px; background:#30363d;
  border-radius:99px; cursor:pointer; position:relative; overflow:hidden;
}
.vc-seek-fill {
  height:100%; background:#58a6ff; border-radius:99px;
  pointer-events:none; transition:width 0.1s linear;
}
.vc-seek-overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  cursor:pointer;
}
.vc-buttons {
  display:flex; align-items:center; gap:10px;
}
.vc-btn {
  background:#21262d; border:1px solid #30363d; color:#e6edf3;
  border-radius:6px; width:30px; height:30px; font-size:13px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:background 0.15s;
}
.vc-btn:hover { background:#30363d; border-color:#58a6ff; }
.vc-time {
  font-size:14px; color:#8b949e; font-variant-numeric:tabular-nums;
  flex-shrink:0;
}
.vc-vol {
  margin-left:auto; display:flex; align-items:center; gap:6px;
}
.vc-vol-slider {
  width:60px; height:3px; background:#30363d; border-radius:99px;
  cursor:pointer; appearance:none; -webkit-appearance:none; outline:none; border:none;
}
.vc-vol-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:10px; height:10px;
  border-radius:50%; background:#58a6ff; cursor:pointer;
}

/* ── COMPARE ── */
.compare-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:20px; width:100%;
}
.compare-card {
  background:#161b22; border:1px solid #30363d; border-radius:12px; padding:24px 28px;
}
.compare-card.highlight { border-color:#58a6ff; background:#0c1929; }
.compare-card .card-title {
  font-size:14px; letter-spacing:1px; text-transform:uppercase;
  margin-bottom:16px; color:#8b949e;
}
.compare-card.highlight .card-title { color:#58a6ff; }
.compare-card ul { list-style:none; display:flex; flex-direction:column; gap:10px; }
.compare-card ul li {
  font-size:16px; line-height:1.5; padding-left:18px;
  position:relative; color:#c9d1d9;
}
.compare-card ul li::before { content:'•'; position:absolute; left:0; color:#484f58; }
.compare-card.highlight ul li::before { color:#58a6ff; }

/* ── SIZE SLIDE ── */
.size-layout { display:flex; gap:24px; width:100%; align-items:flex-start; }
.size-screenshot {
  flex:0 0 56%; background:#090d13;
  border:1px solid #21262d; border-radius:10px;
  overflow:hidden; display:flex; align-items:center; justify-content:center;
}
.size-screenshot img { width:100%; height:auto; display:block; }
.size-stats { flex:1; display:flex; flex-direction:column; gap:14px; }
.stat-box {
  background:#161b22; border:1px solid #30363d;
  border-radius:10px; padding:18px 20px; text-align:center;
}
.stat-box.accent { border-color:#58a6ff; background:#0c1929; }
.stat-box .num {
  font-size:40px; font-weight:700; color:#58a6ff;
  line-height:1; margin-bottom:6px;
}
.stat-box .label { font-size:16px; color:#8b949e; line-height:1.5; }

/* ── COMPAT ── */
.compat-list { display:flex; flex-direction:column; gap:12px; width:100%; }
.compat-item {
  background:#161b22; border:1px solid #30363d; border-radius:10px;
  padding:15px 22px; display:flex; align-items:center; gap:18px;
}
.ci-icon { font-size:22px; flex-shrink:0; }
.compat-item .app { font-size:16px; font-weight:600; min-width:140px; }
.compat-item .status {
  font-size:13px; background:#1f3a2a; color:#3fb950;
  border:1px solid #238636; border-radius:20px; padding:3px 12px;
  min-width:80px; text-align:center; flex-shrink:0;
}
.compat-item .desc { font-size:15px; color:#8b949e; line-height:1.5; }

/* ── SUMMARY ── */
.summary-list { display:flex; flex-direction:column; gap:12px; width:100%; max-width:760px; }
.summary-item {
  display:flex; align-items:flex-start; gap:14px;
  font-size:18px; line-height:1.6; color:#c9d1d9;
}
.summary-item .check { color:#3fb950; font-size:17px; flex-shrink:0; margin-top:3px; }

/* ── WORKFLOW ── */
.workflow { display:flex; align-items:center; width:100%; margin-bottom:24px; }
.wf-step {
  flex:1; background:#161b22; border:1px solid #30363d;
  border-radius:10px; padding:16px 10px; text-align:center;
}
.wf-step .wf-icon { font-size:24px; margin-bottom:7px; }
.wf-step h4 { font-size:14px; font-weight:600; margin-bottom:5px; }
.wf-step p { font-size:13px; color:#8b949e; line-height:1.4; }
.wf-arrow { font-size:16px; color:#58a6ff; padding:0 6px; flex-shrink:0; }
.note-box {
  width:100%; background:#0c1929; border:1px solid #1f3d5c;
  border-radius:10px; padding:14px 20px; font-size:15px;
  color:#8b949e; line-height:1.6; flex-shrink:0;
}
.note-box strong { color:#58a6ff; }

/* ── LANG SWITCHER ── */
.lang-switch {
  position:fixed; top:24px; right:60px;
  display:flex; gap:6px; z-index:200;
}
.lang-btn {
  background:#21262d; border:1px solid #30363d; color:#8b949e;
  border-radius:6px; padding:4px 12px; font-size:14px; font-weight:600;
  cursor:pointer; letter-spacing:1px; transition:all 0.15s;
}
.lang-btn:hover { border-color:#58a6ff; color:#e6edf3; }
.lang-btn.active { background:#0c1929; border-color:#58a6ff; color:#58a6ff; }

/* ── NAV ── */
.nav {
  position:fixed; bottom:28px; right:52px;

}
.nav button {
  background:#21262d; border:1px solid #30363d; color:#e6edf3;

.nav button:hover { background:#30363d; border-color:#58a6ff; }
.nav .counter { font-size:12px; color:#484f58; min-width:44px; text-align:center; }

.progress {
  position:fixed; bottom:0; left:0; height:3px;
  background:#58a6ff; transition:width 0.3s ease; z-index:100;
}
</style>
</head>

// ── LANGUAGE ──────────────────────────────────────────────────────────────────
let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === lang.toUpperCase());
  });
  applyTranslations();
}

function applyTranslations() {
  const d = T[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (d[key] !== undefined) el.textContent = d[key];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (d[key] !== undefined) el.innerHTML = d[key];
  });
}

// ── VIDEO CONTROLS ────────────────────────────────────────────────────────────
function initVideo(vid, ppId, sfId, soId, vtId, vsId) {
  const v  = document.getElementById(vid);
  const pp = document.getElementById(ppId);
  const sf = document.getElementById(sfId);
  const so = document.getElementById(soId);
  const vt = document.getElementById(vtId);
  const vs = vsId ? document.getElementById(vsId) : null;

  function fmt(s) {
    const m = Math.floor(s / 60);
    return m + ':' + String(Math.floor(s % 60)).padStart(2, '0');
  }

  v.addEventListener('timeupdate', () => {
    if (!v.duration) return;
    const pct = (v.currentTime / v.duration) * 100;
    sf.style.width = pct + '%';
    vt.textContent = fmt(v.currentTime) + ' / ' + fmt(v.duration);
  });

  v.addEventListener('loadedmetadata', () => {
    vt.textContent = '0:00 / ' + fmt(v.duration);
  });

  v.addEventListener('play',  () => { pp.textContent = '⏸'; });
  v.addEventListener('pause', () => { pp.textContent = '▶'; });
  v.addEventListener('ended', () => { pp.textContent = '▶'; });

  pp.addEventListener('click', () => { v.paused ? v.play() : v.pause(); });
  v.addEventListener('click',  () => { v.paused ? v.play() : v.pause(); });

  so.addEventListener('click', e => {
    const rect = so.parentElement.getBoundingClientRect();
    const pct  = (e.clientX - rect.left) / rect.width;
    if (v.duration) v.currentTime = pct * v.duration;
  });

  if (vs) {
    vs.addEventListener('input', () => {
      v.volume = vs.value;
      v.muted  = (vs.value == 0);
      document.getElementById(vsId.replace('vs','vm')).textContent = v.muted ? '🔇' : '🔊';
    });
    v.muted  = false;
    v.volume = 1;
    document.getElementById(vsId.replace('vs','vm')).textContent = '🔊';
  }
}

function restartVideo(vid, ppId) {
  const v = document.getElementById(vid);
  v.currentTime = 0;
  v.play();
  document.getElementById(ppId).textContent = '⏸';
}

function toggleMute(vid, vmId) {
  const v  = document.getElementById(vid);
  v.muted  = !v.muted;
  document.getElementById(vmId).textContent = v.muted ? '🔇' : '🔊';
  const vsId = vmId.replace('vm', 'vs');
  document.getElementById(vsId).value = v.muted ? 0 : v.volume || 1;
}

// ── SLIDES ────────────────────────────────────────────────────────────────────
const slides = document.querySelectorAll('.slide');
let cur = 0;

// pause video when leaving slide (0-indexed)
const videoSlides = { 2: 'v3', 3: 'v4', 5: 'v1', 6: 'v2' };

function show(n) {
  // pause current video if any
  const cv = videoSlides[cur];
  if (cv) document.getElementById(cv).pause();

  slides[cur].classList.remove('active');
  cur = (n + slides.length) % slides.length;
  slides[cur].classList.add('active');

  document.getElementById('counter').textContent = (cur + 1) + ' / ' + slides.length;
  document.getElementById('progress').style.width = ((cur + 1) / slides.length * 100) + '%';
}

function next() { show(cur + 1); }
function prev() { show(cur - 1); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') next();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp') prev();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
initVideo('v1','pp1','sf1','so1','vt1','vs1');
initVideo('v2','pp2','sf2','so2','vt2','vs2');
initVideo('v3','pp3','sf3','so3','vt3',null);
initVideo('v4','pp4','sf4','so4','vt4',null);
applyTranslations();
show(0);
</script>
